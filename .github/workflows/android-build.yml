name: Android Build
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - run: ./gradlew testDebugUnitTest assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: AdKiller-Lite-debug
          path: app/build/outputs/apk/debug/app-debug.apk
      - name: Prepare release APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: cp app/build/outputs/apk/debug/app-debug.apk "AdKiller-Lite-${{ github.ref_name }}-debug.apk"
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: AdKiller Lite ${{ github.ref_name }}
          generate_release_notes: true
          files: AdKiller-Lite-${{ github.ref_name }}-debug.apk